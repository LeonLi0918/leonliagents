<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增肌器械健身助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --accent-secondary: #3b82f6;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #2a2a35;
            --success: #22c55e;
            --warning: #eab308;
            --gradient-1: linear-gradient(135deg, #ff6b35 0%, #ff8c5a 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景效果 */
        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-effect::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, -2%) rotate(1deg); }
        }

        /* 应用容器 */
        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-secondary);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        }

        /* 页面切换 */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头部 */
        .header {
            padding: 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-back {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-back:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .header-back svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
        }

        /* 首页 */
        .home-hero {
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .home-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(40px);
        }

        .home-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .home-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .home-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 用户卡片 */
        .user-card {
            margin: 0 20px 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .user-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--gradient-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .user-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .user-info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 安全提示 */
        .safety-notice {
            margin: 0 20px 20px;
            padding: 15px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .safety-notice-icon {
            width: 24px;
            height: 24px;
            background: var(--success);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .safety-notice-icon svg {
            width: 14px;
            height: 14px;
            stroke: white;
        }

        .safety-notice p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* 快捷入口 */
        .quick-actions {
            padding: 0 20px 100px;
        }

        .quick-actions-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .action-btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .action-btn-icon.orange { background: var(--gradient-1); }
        .action-btn-icon.blue { background: var(--gradient-2); }

        .action-btn-text h4 {
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .action-btn-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .action-btn-arrow {
            margin-left: auto;
            color: var(--text-muted);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            padding: 12px 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item.active {
            background: rgba(255, 107, 53, 0.1);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-muted);
        }

        .nav-item.active svg {
            stroke: var(--accent);
        }

        .nav-item span {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .nav-item.active span {
            color: var(--accent);
        }

        /* 部位选择页 */
        .page-header {
            padding: 20px;
            text-align: center;
        }

        .page-header h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .body-parts {
            padding: 0 20px 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .body-part-card {
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .body-part-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .body-part-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .body-part-card:hover::before {
            opacity: 1;
        }

        .body-part-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .body-part-name {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .body-part-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 器械列表页 */
        .equipment-list {
            padding: 0 20px 100px;
        }

        .equipment-card {
            padding: 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .equipment-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .equipment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .equipment-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .equipment-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .equipment-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .tag.safe {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .tag.recommended {
            background: rgba(255, 107, 53, 0.15);
            color: var(--accent);
        }

        /* 动作详情页 */
        .detail-content {
            padding: 0 20px 100px;
        }

        .detail-hero {
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .detail-icon {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 15px;
        }

        .detail-name {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .detail-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .detail-section {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 15px;
        }

        .detail-section-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-section-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .detail-section-content ul {
            list-style: none;
            padding: 0;
        }

        .detail-section-content li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .detail-section-content li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .param-item {
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 10px;
            text-align: center;
        }

        .param-value {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .param-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .warning-box {
            padding: 15px;
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            border-radius: 10px;
            margin-top: 12px;
        }

        .warning-box p {
            font-size: 0.85rem;
            color: var(--warning);
            line-height: 1.5;
        }

        /* 添加到计划按钮 */
        .add-to-plan-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }

        .add-to-plan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .add-to-plan-btn.added {
            background: var(--success);
        }

        /* 我的计划页 */
        .plan-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 20px 20px;
        }

        .plan-stat-card {
            padding: 20px;
            background: var(--bg-card);
            border-radius: 14px;
            text-align: center;
        }

        .plan-stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .plan-stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .plan-list {
            padding: 0 20px 100px;
        }

        .plan-list-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .plan-item {
            padding: 15px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .plan-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .plan-item-info {
            flex: 1;
        }

        .plan-item-name {
            font-size: 0.95rem;
            margin-bottom: 3px;
        }

        .plan-item-part {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .plan-item-remove {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .plan-item-remove:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .plan-item-remove svg {
            width: 16px;
            height: 16px;
            stroke: #ef4444;
        }

        .checkin-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .checkin-btn:hover {
            transform: translateY(-2px);
        }

        .checkin-btn.done {
            background: var(--success);
        }

        .empty-plan {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-plan-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* 打卡历史 */
        .checkin-history {
            margin-top: 30px;
        }

        .checkin-history-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .checkin-item {
            padding: 12px 15px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkin-date {
            font-size: 0.9rem;
        }

        .checkin-count {
            font-size: 0.85rem;
            color: var(--accent);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .app {
                max-width: 100%;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    
    <div class="app">
        <!-- 首页 -->
        <div class="page active" id="page-home">
            <div class="home-hero">
                <div class="home-logo">💪</div>
                <h1 class="home-title">增肌健身助手</h1>
                <p class="home-subtitle">安全 · 科学 · 高效增肌</p>
            </div>

            <div class="user-card">
                <div class="user-card-header">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <h3>健身者档案</h3>
                        <p>45岁 · 男性 · 75kg</p>
                    </div>
                </div>
                <div class="user-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="total-workouts">0</div>
                        <div class="stat-label">训练次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="plan-count">0</div>
                        <div class="stat-label">计划项目</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">4-5</div>
                        <div class="stat-label">每周训练</div>
                    </div>
                </div>
            </div>

            <div class="safety-notice">
                <div class="safety-notice-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <p>已为您开启<strong>关节保护模式</strong>，优先推荐固定器械与坐姿训练，避免高冲击动作</p>
            </div>

            <div class="quick-actions">
                <div class="quick-actions-title">快捷入口</div>
                <div class="action-btn" onclick="showPage('parts')">
                    <div class="action-btn-icon orange">🎯</div>
                    <div class="action-btn-text">
                        <h4>选择训练部位</h4>
                        <p>胸、背、肩、手臂、腿臀、核心</p>
                    </div>
                    <div class="action-btn-arrow">→</div>
                </div>
                <div class="action-btn" onclick="showPage('plan')">
                    <div class="action-btn-icon blue">📋</div>
                    <div class="action-btn-text">
                        <h4>我的训练计划</h4>
                        <p>查看已保存的训练项目</p>
                    </div>

            if (pageId === 'plan') renderPlan();

            currentPart = partId;
            const part = bodyParts.find(p => p.id === partId);
            document.getElementById('equipment-part-name').textContent = `${part.name}训练`;
            document.getElementById('equipment-part-desc').textContent = `以下${equipmentData[partId].length}个器械对关节友好，适合您的增肌目标`;

        // ==================== 计划管理 ====================
        function togglePlan() {
            const eq = currentEquipment;
            const part = bodyParts.find(p => p.id === currentPart);
            const existingIndex = myPlan.findIndex(p => p.id === eq.id);
            
            if (existingIndex > -1) {
                myPlan.splice(existingIndex, 1);
            } else {
                myPlan.push({
                    id: eq.id,
                    name: eq.name,
                    icon: eq.icon,
                    part: part.name,
                    partId: currentPart
                });
            }
            
            localStorage.setItem('myPlan', JSON.stringify(myPlan));
            renderEquipmentDetail();
            updateHomeStats();
        }

        function renderPlan() {
            document.getElementById('plan-total-count').textContent = myPlan.length;
            document.getElementById('total-checkins').textContent = checkins.length;
            
            const container = document.getElementById('plan-list');
            
            if (myPlan.length === 0) {
                container.innerHTML = `

        function removeFromPlan(id) {
            myPlan = myPlan.filter(p => p.id !== id);
            localStorage.setItem('myPlan', JSON.stringify(myPlan));
            renderPlan();
            updateHomeStats();
        }

        function doCheckin() {
            const today = new Date().toDateString();
            const todayIndex = checkins.findIndex(c => new Date(c.date).toDateString() === today);
            
            if (todayIndex > -1) {
                return;
            }
            
            checkins.push({
                date: new Date().toISOString(),
                count: myPlan.length
            });
            
            localStorage.setItem('checkins', JSON.stringify(checkins));
            renderPlan();
            updateHomeStats();
        }

            const day = date.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return `${month}月${day}日 周${weekdays[date.getDay()]}`;

                results.push(hasEqCards ? '✅ 流程测试：部位选择→器械列表 正常' : '❌ 流程测试：器械列表未渲染');
                
                if (hasEqCards) {
                    showEquipmentDetail('chest-press');
                    const detailContainer = document.getElementById('detail-content');
                    const hasDetail = detailContainer && detailContainer.querySelector('.detail-hero');
                    results.push(hasDetail ? '✅ 流程测试：器械→动作详情 正常' : '❌ 流程测试：动作详情未渲染');
                    
                    // 测试添加到计划
                    togglePlan();
                    results.push(myPlan.length > 0 ? '✅ 流程测试：添加到计划 正常' : '❌ 流程测试：添加到计划失败');
                    
                    // 清理测试数据
                    togglePlan();
                }
                
                // 恢复首页
                showPage('home');
            } catch(e) {
                results.push('❌ 流程测试异常：' + e.message);
            }
            
            // 输出结果
            console.log('========== 自检报告 ==========');
            results.forEach(r => console.log(r));
            const passed = results.filter(r => r.startsWith('✅')).length;
            const failed = results.filter(r => r.startsWith('❌')).length;
            console.log('========== 结果：' + passed + ' 通过，' + failed + ' 失败 ==========');
        })();
    </script>
</body>
</html>
